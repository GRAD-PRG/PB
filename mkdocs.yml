site_name: Programmeren Basis
site_description: Leermateriaal — Graduaat Programmeren HOGENT
site_url: https://GRAD-PRG.github.io/PB/

theme:
  name: material
  language: nl
  palette:
    - scheme: default
      primary: grey
      accent: grey
      toggle:
        icon: material/brightness-7
        name: Donkere modus
    - scheme: slate
      primary: grey
      accent: grey
      toggle:
        icon: material/brightness-4
        name: Lichte modus
  features:
    - navigation.sections      # Secties uitklappen in navigatie
    - navigation.top            # "Terug naar boven"-knop
    - search.suggest            # Zoeksuggesties
    - search.highlight          # Zoekresultaten markeren
    - content.code.copy         # Kopieerknop bij codeblokken
    - content.code.annotate     # Annotaties in code

markdown_extensions:
  - admonition                  # Callout-blokken (tip, warning, note, ...)
  - pymdownx.details            # Inklapbare blokken
  - pymdownx.superfences        # Betere code fences
  - pymdownx.highlight:         # Syntax highlighting
      anchor_linenums: true
  - pymdownx.inlinehilite       # Inline code highlighting
  - pymdownx.tabbed:            # Tabs in content
      alternate_style: true
  - attr_list                   # Attributen op elementen
  - md_in_html                  # Markdown binnen HTML-blokken
  - toc:
      permalink: true

plugins:
  - search:
      lang: nl

nav:
  - HOME: index.md
  - VERSIEBEHEER:
    - Git(Hub) in Visual Studio: Aanvulling - Git(Hub) in Visual Studio.md
  - GENERATIEVE AI:
    - GitHub Copilot in Visual Studio: Aanvulling - GitHub Copilot in Visual Studio.md
  - ALGORITMISCH:
    - Iteratie statements: Aanvulling bij D06 - Iteratie statements - voordelen en verschillen.md
  - DATATYPES (VALUE VS REFERENCE):
    - Nullable datatypes: Aanvulling bij D12 - Nullable datatypes en null checks.md
  - NUMERIEKE EN TEMPORAL INFORMATIE:
    - Numerieke datatypes: Aanvulling bij D12 - 2.1. Numerieke datatypes en (impliciete) afrondingsfouten.md
    - Afronden van komagetallen: Aanvulling bij D12 - 2.2 expliciet afronden van komagetallen - belgische wetgeving.md
    - DateTime waarde maken: Aanvulling bij D12 - 3.1.1. DateTime waarde maken - omzetten van inputstrings.md
  - OOP:
    - Subtype polymorfisme: Aanvulling bij D18 - Subtype polymorfisme.md
  - C# TAALFEATURES: Aanvulling - C# taalfeatures.md